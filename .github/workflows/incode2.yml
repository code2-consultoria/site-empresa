# incode2 deployment pipeline
# ============================================================
# Required GitHub Secrets:
#   INCODE2_API_TOKEN    - Token de API para autenticacao
#   INCODE2_WEBHOOK_KEY  - Chave para assinatura HMAC do webhook (opcional)
#   TELEGRAM_BOT_TOKEN   - Token do bot do Telegram (opcional)
#   TELEGRAM_CHAT_ID     - ID do chat do Telegram (opcional)
# ============================================================

name: incode2-deploy

on:
  push:
    branches:
      - main    # Altere para a branch desejada
      - staging # Adicione mais branches conforme necessario

env:
  ENV_NAME: production
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}
  INCODE2_URL: https://in.code2.dev

jobs:
  validate:
    name: Validar HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verificar arquivos essenciais
        run: |
          echo "Verificando arquivos..."
          if [ ! -f "index.html" ]; then
            echo "Erro: index.html não encontrado!"
            exit 1
          fi
          if [ ! -f "Dockerfile" ]; then
            echo "Erro: Dockerfile não encontrado!"
            exit 1
          fi
          if [ ! -f "docker/default.conf" ]; then
            echo "Erro: docker/default.conf não encontrado!"
            exit 1
          fi
          echo "Todos os arquivos essenciais encontrados!"

      - name: Validar HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          blacklist: 9dfc0035191c30602cd5ae9cad1e5a0f.html

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [validate]
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.ENV_NAME }}
            ${{ env.DOCKER_IMAGE }}:build-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger incode2 deploy
        env:
          PAYLOAD: |
            {
              "project": "site-code2",
              "branch": "${{ github.ref_name }}",
              "commit_sha": "${{ github.sha }}",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }},
              "docker_image": "${{ env.DOCKER_IMAGE }}:${{ env.ENV_NAME }}"
            }
        run: |
          echo "::group::Preparando requisição"
          echo "Endpoint: ${{ env.INCODE2_URL }}/deploy/trigger"
          echo "Payload:"
          echo "$PAYLOAD" | jq . 2>/dev/null || echo "$PAYLOAD"
          echo "::endgroup::"

          # Gerar assinatura HMAC-SHA256
          echo "::group::Gerando assinatura HMAC-SHA256"
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.INCODE2_WEBHOOK_KEY }}" | sed 's/SHA2-256(stdin)= //')
          echo "Signature gerada: ${SIGNATURE:0:16}... (truncada)"
          echo "::endgroup::"

          # Fazer requisição e capturar resposta e status code
          echo "::group::Enviando requisição para incode2"
          START_TIME=$(date +%s%3N)

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ env.INCODE2_URL }}/deploy/trigger" \
            -H "Authorization: Bearer ${{ secrets.INCODE2_API_TOKEN }}" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          END_TIME=$(date +%s%3N)
          DURATION=$((END_TIME - START_TIME))
          echo "::endgroup::"

          # Separar body e status code
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)

          # Log detalhado da resposta
          echo "::group::Resposta do incode2"
          echo "Status HTTP: $HTTP_STATUS"
          echo "Tempo de resposta: ${DURATION}ms"
          echo "Response body:"
          echo "$HTTP_BODY" | jq . 2>/dev/null || echo "$HTTP_BODY"
          echo "::endgroup::"

          # Falhar se status code for 4XX ou 5XX
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error title=incode2 API Error::HTTP $HTTP_STATUS - $(echo "$HTTP_BODY" | jq -r '.message // .error // "Unknown error"' 2>/dev/null || echo "$HTTP_BODY")"
            exit 1
          fi

          echo "::notice title=Deploy triggered::incode2 aceitou o deploy (HTTP $HTTP_STATUS em ${DURATION}ms)"

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push'
    needs: [validate, build-and-deploy]
    environment: production

    steps:
      - name: Get workflow conclusion
        id: conclusion
        run: |
          FAILED_JOB=""
          FAILED_REASON=""

          if [ "${{ needs.validate.result }}" == "failure" ]; then
            FAILED_JOB="Validate"
            FAILED_REASON="Validação HTML falhou"
          elif [ "${{ needs.build-and-deploy.result }}" == "failure" ]; then
            FAILED_JOB="Build Docker"
            FAILED_REASON="Falha ao construir imagem Docker"
          fi

          if [ -n "$FAILED_JOB" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "failed_job=$FAILED_JOB" >> $GITHUB_OUTPUT
            echo "failed_reason=$FAILED_REASON" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Check Telegram secrets
        id: telegram-check
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN não configurado"
            echo "configured=false" >> $GITHUB_OUTPUT
          elif [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "::warning::TELEGRAM_CHAT_ID não configurado"
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification (Success)
        if: steps.conclusion.outputs.status == 'success' && steps.telegram-check.outputs.configured == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Pipeline site-code2*

            *Status:* Sucesso
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Autor:* ${{ github.actor }}

            [Ver no GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Send Telegram notification (Failure)
        if: steps.conclusion.outputs.status == 'failure' && steps.telegram-check.outputs.configured == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Pipeline site-code2*

            *Status:* Falhou
            *Etapa:* ${{ steps.conclusion.outputs.failed_job }}
            *Motivo:* ${{ steps.conclusion.outputs.failed_reason }}
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Autor:* ${{ github.actor }}

            [Ver detalhes](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
