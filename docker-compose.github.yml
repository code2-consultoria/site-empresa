services:
  www:
    image: ghcr.io/${GITHUB_REPOSITORY}:${TAG:-production}
    container_name: www-code2
    restart: always
    env_file:
      - .env
    networks:
      - proxymng
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      # Identificador do servico principal
      incode2.main_service: "true"

      # Configuracao de Health Check
      incode2.health_check.enabled: "true"
      incode2.health_check.path: "/"
      incode2.health_check.port: "8080"
      incode2.health_check.expected_status: "200"
      incode2.health_check.timeout: "5"
      incode2.health_check.retries: "10"
      incode2.health_check.interval: "5"

networks:
  proxymng:
    external: true
